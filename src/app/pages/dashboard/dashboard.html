<div class="container">
    <div class="row-mb4">
        <div class="col-lg-12">
            <h2 class="mt-4">Dashboard</h2>
            <p class="lead">Bienvenido al panel de administración del banco.</p>
        </div>
    </div>

    <div class="row mt-4">
        <div class="col-md-4">
            <div class="card shadow-sm border-0" style="width: 18rem">
                <div class="card-body text-center">
                    <h5 class="card-title">Total Clientes</h5>
                    <h3 class="fw-bold text-primary">{{totalClientes}}</h3>
                    <p class=" card-text">
                        Clientes registrados en el sistema.
                    </p>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm border-0" style="width: 18rem">
                <div class="card-body text-center">
                    <h5 class="card-title">Total Cuentas</h5>
                    <h3 class="fw-bold text-primary">{{totalCuentas}}</h3>
                    <p class="card-text">
                        Cuentas registrados en el sistema.
                    </p>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm border-0" style="width: 18rem">
                <div class="card-body text-center">
                    <h5 class="card-title">Total Tipo De Cuentas</h5>
                    <h3 class="fw-bold text-primary">{{totalTiposCuentas}}</h3>
                    <p class=" card-text">
                        Tipo de cuentas en el sistema.
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
