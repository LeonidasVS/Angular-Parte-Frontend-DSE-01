<style>

</style>
<div class="container">
    <div class="row">
        <div class="col-lg-12 d-flex justify-content-between align-items-center mt-5">

            <div>
                <h2 class="fw-bold mb-0">Clientes</h2>
                <p class="lead mb-0">Bienvenido al panel de administración de clientes.</p>
            </div>

            <button class="btn btn-success" routerLink="/clientes/nuevo">
                Cliente Nuevo
            </button>

        </div>
    </div>

    <table class="table table-sm table-bordered table-hover mt-3 shadow-sm text-center">
        <thead class="table-dark">
            <tr>
                <th scope="col" style="width: 70px;">N°</th>
                <th scope="col">Cliente</th>
                <th scope="col">DUI</th>
                <th scope="col">Estado</th>
                <th scope="col" style="width: 125px;">Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let cliente of clientes; let i = index">
                <th scope="row">{{ cliente.codigo }}</th>
                <td>{{ cliente.nombre }}</td>
                <td>{{ cliente.dui }}</td>
                <td><span class="badge"
                        [ngClass]="{'text-bg-success': cliente.estado === 'Activo', 'text-bg-danger': cliente.estado === 'Inactivo'}">{{
                        cliente.estado }}</span></td>
                <td>
                    <div class="d-flex justify-content-center gap-3">
                        <button class="btn btn-primary btn-sm" type="button"><i
                                class="bi bi-pencil-square"></i></button>
                        <button class="btn btn-danger btn-sm" type="button"><i class="bi bi-trash3"></i></button>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>
</div>
